# Configuración de build para Railway
# Solo instala deps y corre el backend (el frontend va en Vercel)

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
# No buildeamos el frontend en Railway (va en Vercel)
# Solo verificamos que el backend compila
cmds = ["echo 'Skipping frontend build - backend runs with tsx'"]

[start]
cmd = "tsx src/api/index.ts"
