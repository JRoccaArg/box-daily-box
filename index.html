<!doctype html>
<html lang="en" class="dark">
  <head>
    <!--
      Este <head> es SOLO el shell global (charset, viewport, favicons,
      fuentes). Todo lo que depende de la página/idioma (title, meta
      description, canonical, hreflang, OG, JSON-LD, atributo lang/dir del
      <html>) lo inyecta <Seo> (src/components/layout/Seo.tsx) vía
      react-helmet, tanto en el prerender como en la navegación client-side.
      Duplicar esos tags acá los dejaría repetidos en el HTML final: Helmet
      los inserta al principio de <head> sin borrar lo que ya hay.
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0B0B" />
    <meta name="author" content="Juan Cruz Rocca" />

    <!-- ─── Favicons ─── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ─── Fuentes ─── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Saira:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
